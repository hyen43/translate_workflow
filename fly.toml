# Fly.io 앱 설정 — 배포: flyctl deploy
# 시크릿 등록 (최초 1회):
#   flyctl secrets set FIGMA_TOKEN=... CONFLUENCE_EMAIL=... CONFLUENCE_TOKEN=... ANTHROPIC_API_KEY=... APP_PASSWORD=...

app = "translate-sheet-sync"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/_stcore/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
